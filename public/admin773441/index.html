<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI MV 后台配置</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app adminApp">
      <section class="panel">
        <p class="eyebrow">SaaS Admin</p>
        <h1>模型 API 配置</h1>
        <p class="hint">这里保存平台 API Key。前台用户生成素材时不需要再输入 Key。</p>

        <div class="tabs">
          <button class="tab active" data-provider="openai-image">OpenAI GPT Image 2</button>
          <button class="tab" data-provider="aliyun-bailian">阿里 HappyHorse</button>
        </div>

        <label>启用状态</label>
        <select id="enabled">
          <option value="true">启用</option>
          <option value="false">停用</option>
        </select>

        <label>API Key</label>
        <input id="apiKey" type="password" autocomplete="new-password" placeholder="保存后会以 ******** 显示" />
        <p class="tip">留空保存：保持原 Key 不变。输入新 Key：覆盖数据库中的 Key。</p>

        <label>Base URL</label>
        <input id="baseUrl" />

        <div id="openaiSettings">
          <div class="row">
            <div>
              <label>默认图片尺寸</label>
              <select id="imageSize">
                <option value="1024x1536">1024x1536 竖图</option>
                <option value="1536x1024">1536x1024 横图</option>
                <option value="1024x1024">1024x1024 方图</option>
                <option value="auto">自动</option>
              </select>
            </div>
            <div>
              <label>默认图片质量</label>
              <select id="imageQuality">
                <option value="high">high</option>
                <option value="medium">medium</option>
                <option value="low">low</option>
                <option value="auto">auto</option>
              </select>
            </div>
          </div>
        </div>

        <div id="aliyunSettings" class="hidden">
          <div class="row">
            <div>
              <label>默认清晰度</label>
              <select id="resolution">
                <option value="720P">720P</option>
                <option value="1080P">1080P</option>
              </select>
            </div>
            <div>
              <label>默认比例</label>
              <select id="ratio">
                <option value="9:16">9:16 TikTok</option>
                <option value="16:9">16:9</option>
                <option value="1:1">1:1</option>
                <option value="4:3">4:3</option>
                <option value="3:4">3:4</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div>
              <label>默认时长</label>
              <input id="duration" type="number" min="3" max="15" value="5" />
            </div>
            <label class="checkbox adminCheckbox">
              <input id="watermark" type="checkbox" />
              <span>默认添加水印</span>
            </label>
          </div>
        </div>

        <button id="save">保存配置</button>
        <a class="backLink" href="/">返回生成页面</a>
      </section>

      <section class="panel result">
        <p class="eyebrow">Current Config</p>
        <h2>当前配置</h2>
        <pre id="output">加载中...</pre>
      </section>
    </main>
    <script src="/admin/app.js"></script>
  </body>
</html>
